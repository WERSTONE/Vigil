# Vigil 训练配置

# ── 模型 ──
model:
  variant: "n"           # n=0.5x (~3M), s=1.0x (~8M)

# ── 训练超参数 ──
training:
  device: "cuda"
  epochs: 50
  batch_size: 1
  num_workers: 0
  lr: 0.001
  weight_decay: 0.0001
  warmup_epochs: 1
  grad_clip: 20.0
  ema_decay: 0.9999
  amp: true

# ── 数据增强 ──
augmentation:
  hsv:
    enabled: true
    hgain: 0.015
    sgain: 0.7
    vgain: 0.4
  flip:
    enabled: true
    prob: 0.5
  mosaic:
    enabled: true
    prob: 0.5

# ── 损失权重 ──
loss:
  box: 3.0
  cls: 1.0
  obj: 1.0
  kpt: 5.0
  helmet: 1.0
  smoke: 1.0

# ── 预训练阶段 ──
pretrain:
  epochs: 50
  datasets:
    person:     {path: "data/processed/person"}
    helmet:     {path: "data/processed/helmet"}
    fire_smoke: {path: "data/processed/fire_smoke"}
    smoking:    {path: "data/processed/smoking"}
    water_leak: {path: "data/processed/water_leak"}
  freeze: []
  optimizer:
    lr: 0.0005
    weight_decay: 0.0001
    warmup_epochs: 1
  output: "checkpoints/pretrain"

# ── 微调阶段 ──
finetune:
  epochs: 50
  datasets:
    custom: {path: "data/raw/custom"}
  freeze: ["backbone"]
  optimizer:
    lr: 0.0005
    weight_decay: 0.0001
    warmup_epochs: 1
  pretrained: "checkpoints/pretrain_best.pt"
  output: "checkpoints/finetune"
