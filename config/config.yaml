# Vigil 推理配置

# ── 模型配置: 当前已下载的 vigil_v2/pretrain_best.pt 使用 0.5/128。
# 新一轮 0.75/160 训练完成后再同步更新这里。
model:
  name: "vigil_v2"
  kwargs:
    backbone_w: 1.5
    neck_ch: 320

# ── 推理配置 ──
inference:
  device: "cuda"
  conf_threshold_person: 0.7
  conf_threshold_anomaly: 0.7
  iou_threshold: 0.5
# ── 后处理参数 ──
postprocess:
  roi_zones: []
  boundary_lines: []
  fall_drop_ratio: 0.15
  fall_duration: 5.0
  wave_amplitude: 0.08
  wave_frequency: 1.5
  wave_duration: 2.0
  fire_smoke_smooth: 3
  water_leak_confirm: 10

# ── 管道配置 ──
pipeline:
  source: "rtsp://"
  fps: 15
  buffer_size: 30

# ── 日志 ──
logging:
  level: "INFO"
