# Vigil 推理配置

# ── 模型架构 ──
model:
  input_size: [640, 640]
  backbone: "yolov8n"
  pretrained: true
  num_keypoints: 17
  anomaly_classes: 4
  mask_dim: 32

# ── 推理配置 ──
inference:
  device: "cpu"
  precision: "fp32"
  conf_threshold_person: 0.25
  conf_threshold_anomaly: 0.15
  iou_threshold: 0.45

# ── 后处理参数 ──
postprocess:
  roi_zones: []
  boundary_lines: []
  fall_drop_ratio: 0.15
  fall_duration: 5.0
  wave_amplitude: 0.08
  wave_frequency: 1.5
  wave_duration: 2.0
  fire_smoke_smooth: 3
  water_leak_confirm: 10

# ── 管道配置 ──
pipeline:
  source: "rtsp://"
  fps: 15
  buffer_size: 30

# ── 日志 ──
logging:
  level: "INFO"
