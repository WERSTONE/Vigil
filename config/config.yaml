# Vigil 推理配置

# ── 推理配置 ──
inference:
  device: "cpu"
  conf_threshold_person: 0.5
  conf_threshold_anomaly: 0.5
  iou_threshold: 0.5

# ── 后处理参数 ──
postprocess:
  roi_zones: []
  boundary_lines: []
  fall_drop_ratio: 0.15
  fall_duration: 5.0
  wave_amplitude: 0.08
  wave_frequency: 1.5
  wave_duration: 2.0
  fire_smoke_smooth: 3
  water_leak_confirm: 10

# ── 管道配置 ──
pipeline:
  source: "rtsp://"
  fps: 15
  buffer_size: 30

# ── 日志 ──
logging:
  level: "INFO"
